name: Security & CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

permissions:
  contents: read
  security-events: write

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Create stub .env for tests
        run: |
          echo "SUPABASE_URL=https://placeholder.supabase.co" >> .env
          echo "SUPABASE_ANON_KEY=placeholder-anon-key" >> .env
          echo "SENTRY_DSN=" >> .env
          echo "MAPBOX_TOKEN=" >> .env
          echo "TINYMCE_API_KEY=" >> .env
          echo "UMAMI_WEBSITE_ID=" >> .env
          echo "UMAMI_SHARE_URL=" >> .env
          echo "VAPID_PUBLIC_KEY=" >> .env

      - name: Run unit tests
        run: npm run test:run

  supply-chain-audit:
    name: Supply Chain Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Audit NPM dependencies
        run: npm audit --audit-level=critical

  secret-scanning:
    name: Secrets & Credentials Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  sast-code-scan:
    name: SAST Code Analysis (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Semgrep
        run: python -m pip install --upgrade semgrep

      - name: Run Semgrep Scan
        run: semgrep scan --config auto --severity ERROR --exclude docs
