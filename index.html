<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Security headers are managed server-side in vercel.json and vite.config.ts to avoid duplicate policies and meta-specification errors -->
    <link rel="icon" type="image/png" sizes="32x32" href="/branding/favicon.png">
    <link rel="icon" type="image/x-icon" href="/branding/favicon.ico">
    <link rel="apple-touch-icon" href="/branding/logo.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="The Base">
    <meta name="msapplication-TileColor" content="#1a6b3c">
    <meta name="theme-color" content="#1a6b3c">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <!--
      Icon + flag stylesheets are third-party and were render-blocking (~20s on the
      Slow-4G PageSpeed run). Neither is needed for first paint, so load them async
      via the media="print"/onload swap so they stay off the critical path.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0&display=block"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0&display=block" rel="stylesheet" />
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css" />
    </noscript>
    <!-- Umami analytics -->
    <script 
      defer 
      src="https://cloud.umami.is/script.js" 
      data-website-id="a974852e-714c-4a57-a215-111c0b2460bf">
    </script>
    <!--app-head-->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
