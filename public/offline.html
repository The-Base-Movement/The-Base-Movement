<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No connection — The Base Movement</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Public Sans', system-ui, sans-serif;
      background: #f9f9f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      color: #1a1a1a;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 40px 32px;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    img { width: 72px; height: 72px; object-fit: contain; margin-bottom: 20px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #1a6b3c;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #155c33; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/branding/logo.png" alt="The Base Movement" />
    <h1>You're offline</h1>
    <p>It looks like you lost your connection. Check your network and try again.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
