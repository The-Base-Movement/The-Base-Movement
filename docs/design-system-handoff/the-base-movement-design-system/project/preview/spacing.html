<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:#fff;color:var(--on-surface);font-family:var(--font-meta)}.row{display:flex;align-items:flex-end;gap:12px}.box{background:var(--brand-green);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;border-radius:2px}.lbl{font-size:10px;color:var(--on-surface-muted);font-weight:700;margin-top:6px;text-align:center}.col{display:flex;flex-direction:column;align-items:center}h4{margin:0 0 14px;font-size:11px;font-weight:700;color:var(--on-surface-muted);letter-spacing:.05em}</style></head><body><h4>Spacing scale (px)</h4><div class="row"><div class="col"><div class="box" style="width:8px;height:8px"></div><div class="lbl">8<br>sm</div></div><div class="col"><div class="box" style="width:16px;height:16px"></div><div class="lbl">16<br>md</div></div><div class="col"><div class="box" style="width:24px;height:24px"></div><div class="lbl">24<br>gutter</div></div><div class="col"><div class="box" style="width:32px;height:32px"></div><div class="lbl">32<br>lg</div></div><div class="col"><div class="box" style="width:40px;height:40px"></div><div class="lbl">40<br>sec-mob</div></div><div class="col"><div class="box" style="width:96px;height:48px">96</div><div class="lbl">section-pad-desktop</div></div></div></body></html>
