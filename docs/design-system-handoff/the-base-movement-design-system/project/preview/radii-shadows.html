<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:24px;background:#f6fbf4;color:var(--on-surface);font-family:var(--font-meta)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.t{background:#fff;border:1px solid var(--border);padding:18px 14px;display:flex;flex-direction:column;gap:8px;align-items:flex-start;font-size:11px;font-weight:700}.t .swatch{width:42px;height:42px;background:var(--brand-green)}.t code{font-family:ui-monospace,Menlo,monospace;font-size:10px;color:var(--on-surface-muted)}.r2{border-radius:2px}.r4{border-radius:4px}.r8{border-radius:8px}.r12{border-radius:12px}.shadow-card{box-shadow:0 4px 20px -2px rgba(0,0,0,.05)}.shadow-lift{box-shadow:0 10px 30px -8px rgba(0,0,0,.15)}.shadow-cta{box-shadow:0 24px 48px -8px rgba(0,0,0,.4)}</style></head><body><div class="grid"><div class="t r2"><div class="swatch r2"></div>radius xs<code>2px</code></div><div class="t r4"><div class="swatch r4"></div>radius sm<code>4px · default</code></div><div class="t r8"><div class="swatch r8"></div>radius md<code>8px</code></div><div class="t r12"><div class="swatch r12"></div>radius lg<code>12px · pill</code></div><div class="t r4 shadow-card" style="grid-column:span 2"><div class="swatch r4"></div>shadow-card<code>0 4px 20px -2px rgba(0,0,0,.05)</code></div><div class="t r4 shadow-lift"><div class="swatch r4"></div>shadow-lift<code>hover</code></div><div class="t r4 shadow-cta" style="background:#181d19;color:#fff"><div class="swatch r4"></div>shadow-cta<code>hero card</code></div></div></body></html>
