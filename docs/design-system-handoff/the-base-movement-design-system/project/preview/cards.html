<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:24px;background:#f6fbf4;color:var(--on-surface);font-family:var(--font-body)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.card{background:#fff;border:1px solid var(--border);padding:18px;border-radius:4px;box-shadow:0 4px 20px -2px rgba(0,0,0,.05)}.pillar{background:#fff;border:1px solid var(--border);border-left:4px solid #DAA520;padding:18px;border-radius:0 4px 4px 0}.eyebrow{font-family:var(--font-meta);font-size:10px;font-weight:700;color:#006B3F;letter-spacing:.04em;margin-bottom:6px}h4{margin:0 0 6px;font-family:var(--font-display);font-weight:700;font-size:16px;letter-spacing:-.01em}p{margin:0;font-size:12px;line-height:1.55;color:var(--on-surface-muted)}</style></head><body><div class="grid"><div class="card"><div class="eyebrow">Latest update</div><h4>Eastern region branch launches youth jobs program</h4><p>Local chapters expanded to 14 districts this quarter.</p></div><div class="pillar"><div class="eyebrow" style="color:#DAA520">Core Pillar 02</div><h4>Youth Participation</h4><p>Young people equipped to lead Ghana's development.</p></div></div></body></html>
