<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:24px;background:#fff;color:var(--on-surface);font-family:var(--font-meta);display:flex;flex-direction:column;gap:14px}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}button{font-family:var(--font-meta);font-weight:700;letter-spacing:-.01em;border:0;cursor:pointer;display:inline-flex;align-items:center;gap:8px;padding:0 18px;height:44px;font-size:13px;border-radius:4px;transition:all .2s ease}.gold{background:#DAA520;color:#fff;box-shadow:0 8px 24px -8px rgba(218,165,32,.4)}.gold:hover{background:#c4951c}.primary{background:#006B3F;color:#fff}.primary:hover{background:#005733}.dest{background:#CE1126;color:#fff}.outline{background:transparent;color:#181d19;border:1px solid var(--border)}.outline:hover{border-color:#006B3F;color:#006B3F}.ghost{background:transparent;color:#181d19}.ghost:hover{color:#006B3F}.lg{height:52px;padding:0 24px;font-size:14px}.sm{height:34px;padding:0 14px;font-size:11px}.lbl{font-size:10px;color:var(--on-surface-muted);font-weight:700;letter-spacing:.05em}</style></head><body><div><div class="lbl">Primary actions</div><div class="row" style="margin-top:6px"><button class="gold lg">Join the Movement →</button><button class="primary lg">Learn More About Us</button><button class="dest lg">Donate</button></div></div><div><div class="lbl">Sizes</div><div class="row" style="margin-top:6px"><button class="primary lg">Large</button><button class="primary">Default</button><button class="primary sm">Small</button></div></div><div><div class="lbl">Variants</div><div class="row" style="margin-top:6px"><button class="outline">Outline</button><button class="ghost">Ghost</button></div></div></body></html>
