<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-meta)}.row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.t{padding:14px;border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;gap:12px;font-weight:700;font-size:13px}.dot{width:18px;height:18px;border-radius:50%;flex-shrink:0}.t code{margin-left:auto;font-size:10px;color:var(--on-surface-muted);font-family:ui-monospace,Menlo,monospace;font-weight:600}h4{margin:0 0 8px;font-size:11px;font-weight:700;color:var(--on-surface-muted);letter-spacing:.05em}</style></head><body><h4>Semantic roles</h4><div class="row"><div class="t"><span class="dot" style="background:#006B3F"></span>primary <code>green</code></div><div class="t"><span class="dot" style="background:#DAA520"></span>accent <code>gold</code></div><div class="t"><span class="dot" style="background:#CE1126"></span>destructive <code>red</code></div><div class="t"><span class="dot" style="background:#4C7F63"></span>success <code>#4C7F63</code></div><div class="t"><span class="dot" style="background:#8B0000"></span>error-deep <code>#8B0000</code></div><div class="t"><span class="dot" style="background:#4682B4"></span>info-soft <code>#4682B4</code></div></div></body></html>
