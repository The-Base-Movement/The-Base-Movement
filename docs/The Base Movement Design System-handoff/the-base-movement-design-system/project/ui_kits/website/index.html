<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>The Base — UI kit demo</title>
<link rel="icon" href="../../assets/favicon.ico" />
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;800&family=Work+Sans:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="site.css" />
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="BrandLine.jsx"></script>
<script type="text/babel" src="Buttons.jsx"></script>
<script type="text/babel" src="Navbar.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="PlatformSplit.jsx"></script>
<script type="text/babel" src="PillarsSection.jsx"></script>
<script type="text/babel" src="StatsSection.jsx"></script>
<script type="text/babel" src="CTASection.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel">
function App() {
  const [logged, setLogged] = React.useState(false);
  const [toast, setToast] = React.useState(null);
  const fire = (msg, gold) => { setToast({ msg, gold }); setTimeout(() => setToast(null), 2500); };
  return (
    <>
      <Navbar
        isLoggedIn={logged}
        onLogin={() => { setLogged(true); fire('Welcome back, patriot.', false); }}
        onLogout={() => { setLogged(false); fire('Logged out.', false); }}
        onRegister={() => fire('Registration form opening…', true)}
      />
      <Hero
        onJoin={() => fire('Registration form opening…', true)}
        onLearn={() => fire('Loading The Plan…', false)}
      />
      <PlatformSplit
        onGhana={() => fire('Joining Base Ghana…', false)}
        onDiaspora={() => fire('Joining Base Diaspora…', true)}
      />
      <PillarsSection />
      <StatsSection />
      <CTASection
        onRegister={() => { setLogged(true); fire('Welcome to The Base.', true); }}
        onAgenda={() => fire('Loading The Plan…', false)}
      />
      <Footer />
      {toast && <div className={`tbm-toast ${toast.gold ? 'tbm-toast--gold' : ''}`}>{toast.msg}</div>}
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
