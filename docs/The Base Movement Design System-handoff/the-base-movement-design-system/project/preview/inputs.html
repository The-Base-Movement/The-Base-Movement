<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:24px;background:#fff;color:var(--on-surface);font-family:var(--font-meta);display:flex;flex-direction:column;gap:12px}label{font-size:10px;font-weight:700;color:var(--on-surface-muted);letter-spacing:.05em;display:block;margin-bottom:6px}input,select{display:block;width:100%;background:transparent;border:1px solid var(--outline-variant);padding:12px 14px;font-size:13px;border-radius:4px;font-family:var(--font-body);color:var(--on-surface);transition:all .2s ease;box-sizing:border-box}input:focus{outline:none;border-color:#006B3F;box-shadow:inset 0 0 0 2px rgba(0,107,63,.1)}.dark{background:#1A1A1A;padding:18px;border-radius:6px}.dark input{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:#fff}.dark input::placeholder{color:#666}.dark label{color:rgba(255,255,255,.6)}</style></head><body><div><label>Email address</label><input type="email" placeholder="you@example.com"></div><div><label>Region</label><select><option>Greater Accra</option></select></div><div class="dark"><label>Stay informed.</label><input placeholder="Email Address"></div></body></html>
